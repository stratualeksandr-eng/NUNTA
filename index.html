<style>

.hero-strip .std{transform:rotate(180deg);writing-mode:vertical-rl;white-space:nowrap;font-family:var(--serif);font-weight:500;text-transform:uppercase;letter-spacing:.28em;font-size:clamp(17px,3.2vw,26px);color:var(--on-dark);line-height:1;}

.gate .g-btn{margin-top:42px;display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-weight:400;letter-spacing:.2em;text-transform:uppercase;font-size:13px;color:var(--on-dark);background:var(--taupe);border:none;padding:16px 40px;border-radius:999px;cursor:pointer;transition:.25s;box-shadow:0 12px 30px rgba(60,53,43,.26);}
.gate .g-btn:hover{background:var(--taupe-deep);transform:translateY(-2px);}
.music-btn{position:fixed;right:18px;bottom:18px;z-index:900;width:50px;height:50px;border-radius:50%;border:none;background:var(--taupe);color:var(--on-dark);font-size:21px;line-height:1;cursor:pointer;box-shadow:0 8px 22px rgba(60,53,43,.3);display:flex;align-items:center;justify-content:center;transition:background .25s;}

@keyframes mpulse{0%,100%{box-shadow:0 8px 22px rgba(60,53,43,.3);}50%{box-shadow:0 8px 30px rgba(125,113,100,.6);}}
</style>

<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#7d7164"/><text x="50" y="46" font-family="Georgia,serif" font-size="30" fill="#f4efe7" text-anchor="middle">P</text><text x="50" y="74" font-family="Georgia,serif" font-size="30" fill="#f4efe7" text-anchor="middle">A</text></svg>
</template>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const EVENT = {
  groom: "Alexandr",
  bride: "Petronela",
  date: new Date(2026, 8, 26, 17, 0, 0),
  dateLabel: "26 Septembrie 2026",
  dateNums: ["26", "09", "26"],
  weekday: "Sâmbătă",
  venue: "Naturalia Inn",
  city: "Brașov",
  address: "Brașov",
  mapsQuery: "Naturalia Inn Brașov",
  rsvpPhone: "40770699326",
  rsvpDeadline: "4 septembrie 2026",
};

function Reveal({ children, as = "div", className = "", style, delay = 0 }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => { if (e.isIntersecting) { el.classList.add("in"); io.unobserve(el); } });
    }, { threshold: 0.15 });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const Tag = as;
  return React.createElement(Tag, { ref, className: `reveal ${className}`, style: { transitionDelay: `${delay}ms`, ...style } }, children);
}

const Tick = () => (
  <div className="tick"><span className="ln" /></div>
);

function Hero() {
  const [photoUrl, setPhotoUrl] = React.useState(() => {
    try { return localStorage.getItem("hero_photo") || null; } catch { return null; }
  });

  function handlePhotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        // downscale so large phone photos fit in storage & render reliably
        const maxW = 1600;
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const url = canvas.toDataURL("image/jpeg", 0.85);
        try { localStorage.setItem("hero_photo", url); } catch (err) {}
        setPhotoUrl(url);
      };
      img.onerror = () => {
        // fallback: use raw data if it can't be decoded for canvas
        const url = ev.target.result;
        try { localStorage.setItem("hero_photo", url); } catch (err) {}
        setPhotoUrl(url);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    // reset so selecting the same file again still fires onChange
    e.target.value = "";
  }

  return (
    <section className="hero" id="top">
      <div className="hero-strip">
        <div className="std">Save the date</div>
        <span className="vline" />
      </div>
      <div className="hero-photo">
        <img src="hero.jpg" alt="Petronela & Alexandr" />
        <div className="grad" />
        <div className="hero-cap">
          <div className="names">
            <div className="n1">{EVENT.bride}</div>
            <div className="amp">&amp;</div>
            <div className="n2">{EVENT.groom}</div>
          </div>
          <div className="invite">Vă invităm<br />la nunta noastră</div>
          <div className="date">
            <span>{EVENT.dateNums[0]}</span><span className="bar" />
            <span>{EVENT.dateNums[1]}</span><span className="bar" />
            <span>{EVENT.dateNums[2]}</span>
          </div>
        </div>
      </div>
    </section>
  );
}

function Intro() {
  return (
    <section className="intro">
      <div className="wrap">
        <Reveal><Tick /></Reveal>
        <Reveal as="p" delay={80}>
          „Cu bucurie în suflet, vă invităm să fiți alături de noi în ziua în care vom spune «Da».”
        </Reveal>
      </div>
    </section>
  );
}

function Nasi() {
  return (
    <section className="nasi">
      <div className="wrap">
        <Reveal className="sec-head">
          <span className="overline">Cu binecuvântarea</span>
          <h2>Nașilor noștri</h2>
        </Reveal>
        <Reveal className="nasi-names">Arabela <span className="amp">&amp;</span> Ciprian Petruș</Reveal>
      </div>
    </section>
  );
}

function Countdown() {
  const [t, setT] = useState(() => diff(EVENT.date));
  useEffect(() => { const id = setInterval(() => setT(diff(EVENT.date)), 1000); return () => clearInterval(id); }, []);
  function diff(target) {
    const ms = Math.max(0, target - new Date());
    return {
      d: Math.floor(ms / 86400000),
      h: Math.floor((ms % 86400000) / 3600000),
      m: Math.floor((ms % 3600000) / 60000),
      s: Math.floor((ms % 60000) / 1000),
    };
  }
  const cells = [[t.d, "Zile"], [t.h, "Ore"], [t.m, "Minute"], [t.s, "Secunde"]];
  return (
    <section className="countdown">
      <div className="wrap">
        <Reveal className="overline">Mai sunt</Reveal>
        <Reveal className="cd-grid" delay={60}>
          {cells.map(([n, lab]) => (
            <div className="cd-cell" key={lab}>
              <div className="cd-num">{String(n).padStart(2, "0")}</div>
              <div className="cd-lab">{lab}</div>
            </div>
          ))}
        </Reveal>
      </div>
    </section>
  );
}

function Details() {
  const rows = [
    { h: "Data", big: EVENT.dateLabel, sub: EVENT.weekday },
    { h: "Cununie religioasă", big: "Biserica \"Sfânta Treime\" Schei-Tocile", sub: "Brașov" },
    { h: "Restaurant", big: EVENT.venue, sub: EVENT.city },
  ];
  return (
    <section className="details" id="detalii">
      <div className="wrap">
        <Reveal className="sec-head">
          <span className="overline">Tot ce trebuie să știți</span>
          <h2>Detaliile zilei</h2>
        </Reveal>
        <div className="detail-grid">
          {rows.map((c, i) => (
            <Reveal className="detail-row" key={c.h} delay={i * 90}>
              <h3>{c.h}</h3>
              <div className="big">{c.big}</div>

function Rsvp() {
  const [sent, setSent] = useState(() => {
    try { return JSON.parse(localStorage.getItem("rsvp_sent2") || "null"); } catch { return null; }
  });
  const [name, setName] = useState("");
  const [attending, setAttending] = useState(null);
  const [guests, setGuests] = useState(1);
  const [msg, setMsg] = useState("");

  function sendToGoogleForm(d) {
    const url = "https://docs.google.com/forms/d/e/1FAIpQLScePHvtf8hRREMx_zHFdNgDrkgxkaMaQHPPyIhYgVjrYkr8yA/formResponse";
    const params = new URLSearchParams();
    params.append("entry.1681332730", d.name);
    params.append("entry.1357037857", d.attending ? "Da, cu drag" : "Din păcate, nu");
    params.append("entry.1715608026", d.attending ? String(d.guests) : "0");
    params.append("entry.435247196", d.msg || "");
    fetch(url, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: params.toString() }).catch(() => {});
  }

  function submit(e) {
    e.preventDefault();
    if (!name.trim() || attending === null) return;
    const data = { name: name.trim(), attending, guests: attending ? guests : 0, msg: msg.trim(), at: Date.now() };
    sendToGoogleForm(data);
    try { localStorage.setItem("rsvp_sent2", JSON.stringify(data)); } catch {}
    setSent(data);
  }
  function waText(d) {
    return d.attending
      ? `Bună! Confirm prezența la nunta voastră.\nNume: ${d.name}\nNumăr persoane: ${d.guests}` + (d.msg ? `\nMesaj: ${d.msg}` : "")
      : `Bună! Din păcate nu voi putea ajunge.\nNume: ${d.name}` + (d.msg ? `\nMesaj: ${d.msg}` : "");
  }
  const waLink = (d) => "https://wa.me/" + EVENT.rsvpPhone + "?text=" + encodeURIComponent(waText(d));

  return (
    <section className="rsvp" id="rsvp">
      <div className="wrap">
        <Reveal className="sec-head">
          <span className="overline on-dark">Vă așteptăm răspunsul</span>
          <h2>Confirmați prezența</h2>
        </Reveal>
        {sent ? (
          <Reveal className="rsvp-card">
            <div className="rsvp-thanks">
              <div className="check">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4">
                  <path d="M5 12.5l4.5 4.5L19 7" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              </div>
              <h3>{sent.attending ? "Vă mulțumim!" : "Vă mulțumim de răspuns"}</h3>
              <p>
                {sent.attending
                  ? `${sent.name}, am notat ${sent.guests} ${sent.guests === 1 ? "persoană" : "persoane"}. Abia așteptăm să sărbătorim împreună!`
                  : `${sent.name}, ne pare rău că nu puteți ajunge. Vă mulțumim că ne-ați anunțat.`}
              </p>
              <a className="btn btn-outline" href={waLink(sent)} target="_blank" rel="noopener">Trimite pe WhatsApp</a>
              <span className="muted-link" onClick={() => { try { localStorage.removeItem("rsvp_sent2"); } catch {}; setSent(null); }}>Modificați răspunsul</span>
            </div>
          </Reveal>
        ) : (
          <Reveal className="rsvp-card">
            <form onSubmit={submit}>
              <div className="field">
                <label>Numele dumneavoastră</label>
                <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Nume și prenume" required />
              </div>
              <div className="field">
                <label>Veți participa?</label>
                <div className="choice">
                  <button type="button" className={attending === true ? "on" : ""} onClick={() => setAttending(true)}>Da, cu drag</button>
                  <button type="button" className={attending === false ? "on" : ""} onClick={() => setAttending(false)}>Din păcate, nu</button>
                </div>
              </div>
              {attending === true && (
                <div className="field">
                  <label>Număr de persoane</label>
                  <div className="stepper">
                    <button type="button" onClick={() => setGuests((g) => Math.max(1, g - 1))}>−</button>
                    <span className="val">{guests}</span>
                    <button type="button" onClick={() => setGuests((g) => Math.min(10, g + 1))}>+</button>
                  </div>
                </div>
              )}
              <div className="field">
                <label>Un gând pentru noi (opțional)</label>
                <textarea value={msg} onChange={(e) => setMsg(e.target.value)} placeholder="Urări, întrebări, preferințe…" />
              </div>
              <button className="btn btn-primary" type="submit">Trimite confirmarea</button>
              <p className="deadline">Vă rugăm să confirmați până la {EVENT.rsvpDeadline}</p>
            </form>
          </Reveal>
        )}
      </div>
    </section>
  );
}

function Root() {
  const [entered, setEntered] = useState(false);
  const [hiding, setHiding] = useState(false);
  const [playing, setPlaying] = useState(false);
  const audioRef = useRef(null);
  function enter() {
    const a = audioRef.current;
    if (a) { a.volume = 0.55; a.play().then(() => setPlaying(true)).catch(() => {}); }
    setHiding(true);
    setTimeout(() => setEntered(true), 600);
  }
  function toggleMusic() {
    const a = audioRef.current; if (!a) return;
    if (a.paused) { a.play().then(() => setPlaying(true)).catch(() => {}); }
    else { a.pause(); setPlaying(false); }
  }
  return (
    <React.Fragment>
      <App />
      <audio ref={audioRef} src="music.mp3" loop preload="auto"></audio>
      {entered && (
        <button className={"music-btn" + (playing ? " on" : "")} onClick={toggleMusic} aria-label="Muzică" title={playing ? "Pauză" : "Redă muzica"}>
          {playing ? "♫" : "♪"}
        </button>
      )}
      {!entered && (
        <div className={"gate" + (hiding ? " hide" : "")}>
          <div className="g-over">Vă invităm</div>
          <div className="g-names">
            <div>{EVENT.bride}</div>
            <div className="g-amp">&amp;</div>
            <div>{EVENT.groom}</div>
          </div>
          <div className="g-date">{EVENT.dateLabel}</div>
          <button className="g-btn" onClick={enter}>♪&nbsp;&nbsp;Apasă</button>
        </div>
      )}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
